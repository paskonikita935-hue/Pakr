name: Build APK
on:
  workflow_dispatch:
    inputs:
      app_url:
        description: Target URL
        required: true
      app_name:
        description: App Name
        required: true
      package_name:
        description: Package Name
        required: true
      version_name:
        description: Version Name
        required: true
        default: 1.0.0
      icon_url:
        description: Icon Image URL (optional, leave empty to use repo logo.jpg)
        required: false
        default: ''
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Inject parameters
        env:
          IN_APP_URL: ${{ github.event.inputs.app_url }}
          IN_APP_NAME: ${{ github.event.inputs.app_name }}
          IN_PACKAGE_NAME: ${{ github.event.inputs.package_name }}
          IN_VERSION_NAME: ${{ github.event.inputs.version_name }}
        run: |
          python3 - <<'PY'
          import os

          def replace_in_file(path, mapping):
              with open(path, 'r', encoding='utf-8') as f:
                  content = f.read()
              for old, new in mapping.items():
                  content = content.replace(old, new)
              with open(path, 'w', encoding='utf-8') as f:
                  f.write(content)

          app_url = os.environ['IN_APP_URL']
          app_name = os.environ['IN_APP_NAME']
          pkg = os.environ['IN_PACKAGE_NAME']
          ver = os.environ['IN_VERSION_NAME']

          parts = (ver.split('.') + ['0', '0', '0'])[:3]
          try:
              vc = int(parts[0]) * 10000 + int(parts[1]) * 100 + int(parts[2])
          except ValueError:
              vc = 1

          replace_in_file('app/src/main/java/com/webviewapp/MainActivity.kt', {'{{APP_URL}}': app_url})
          replace_in_file('app/src/main/AndroidManifest.xml', {'{{APP_PACKAGE}}': pkg, '{{APP_NAME}}': app_name})
          replace_in_file('app/build.gradle', {'{{APP_PACKAGE}}': pkg, '{{VERSION_NAME}}': ver, '{{VERSION_CODE}}': str(vc)})
          replace_in_file('app/src/main/res/values/strings.xml', {'{{APP_NAME}}': app_name})

          pkg_path = pkg.replace('.', '/')
          os.makedirs(f'app/src/main/java/{pkg_path}', exist_ok=True)

          kt_dir = 'app/src/main/java/com/webviewapp'
          for fname in os.listdir(kt_dir):
              if fname.endswith('.kt'):
                  fpath = os.path.join(kt_dir, fname)
                  replace_in_file(fpath, {'package com.webviewapp': f'package {pkg}'})
                  os.rename(fpath, os.path.join(f'app/src/main/java/{pkg_path}', fname))

          replace_in_file('app/src/main/res/layout/activity_main.xml', {'com.webviewapp': pkg})

          print(f"PKG_PATH is: {pkg_path}")
          PY

      - name: Ensure fallback launcher resources
        run: |
          python3 - <<'PY'
          import base64, os
          png = base64.b64decode('iVBORw0KGgoAAAANSUhEUgAAAMAAAADACAIAAADdvvtQAAAAWUlEQVR4nO3BAQ0AAADCoPdPbQ43oAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAfgx1lAABqFDyOQAAAABJRU5ErkJggg==')
          for density in ['mdpi','hdpi','xhdpi','xxhdpi','xxxhdpi']:
              base = f'app/src/main/res/mipmap-{density}'
              os.makedirs(base, exist_ok=True)
              for name in ['ic_launcher.png', 'ic_launcher_round.png']:
                  path = os.path.join(base, name)
                  if not os.path.exists(path) or os.path.getsize(path) < 100:
                      open(path, 'wb').write(png)
          PY

      - name: Process icon
        env:
          ICON_URL: ${{ github.event.inputs.icon_url }}
        run: |
          pip install Pillow -q
          python3 Scripts/process_icon.py

      - name: Build APK (arm64 + armeabi-v7a)
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Sign APK
        env:
          IN_APP_NAME: ${{ github.event.inputs.app_name }}
          IN_VERSION_NAME: ${{ github.event.inputs.version_name }}
        run: |
          KS_B64="${{ secrets.KEYSTORE_BASE64 }}"
          if [ -n "$KS_B64" ]; then
            echo "$KS_B64" | base64 --decode > /tmp/release.keystore
            KS_PASS="${{ secrets.KEYSTORE_PASSWORD }}"
            KEY_ALIAS="${{ secrets.KEY_ALIAS }}"
            KEY_PASS="${{ secrets.KEY_PASSWORD }}"
          else
            keytool -genkey -v -keystore /tmp/release.keystore -alias debugkey -keyalg RSA -keysize 2048 -validity 3650 -storepass android -keypass android -dname "CN=Debug,O=Debug,C=US" -noprompt
            KS_PASS="android"
            KEY_ALIAS="debugkey"
            KEY_PASS="android"
          fi
          BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -1)
          SAFE=$(printf '%s' "$IN_APP_NAME" | tr -c 'A-Za-z0-9_-' '_')
          VER="$IN_VERSION_NAME"
          mkdir -p /tmp/signed
          echo "=== Searching for split APK files ==="
          find app/build -name '*.apk' 2>/dev/null || echo "No APK found in app/build"
          FOUND=0
          while IFS= read -r APK; do
            [ -z "$APK" ] && continue
            echo "Processing: $APK"
            ABI=$(echo "$APK" | grep -oE 'arm64-v8a|armeabi-v7a' | head -1)
            [ -z "$ABI" ] && continue
            OUT="/tmp/signed/${SAFE}_${VER}_${ABI}.apk"
            $ANDROID_HOME/build-tools/$BUILD_TOOLS/zipalign -v -p 4 "$APK" /tmp/aligned_${ABI}.apk
            $ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner sign               --ks /tmp/release.keystore --ks-pass "pass:$KS_PASS"               --ks-key-alias "$KEY_ALIAS" --key-pass "pass:$KEY_PASS"               --out "$OUT" /tmp/aligned_${ABI}.apk
            $ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner verify "$OUT"
            echo "Signed: $OUT"
            FOUND=1
          done < <(find app/build -type f \( -name '*arm64-v8a*release*.apk' -o -name '*armeabi-v7a*release*.apk' -o -path '*/release/*arm64-v8a*.apk' -o -path '*/release/*armeabi-v7a*.apk' \) 2>/dev/null)
          if [ "$FOUND" -ne 1 ]; then
            echo "No split ABI APKs found" >&2
            exit 1
          fi
          ls -la /tmp/signed/
          echo "SIGNED_DIR=/tmp/signed" >> $GITHUB_ENV
          echo "APK_NAME=${SAFE}_${VER}" >> $GITHUB_ENV
      - name: Upload arm64 APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}_arm64-v8a
          path: ${{ env.SIGNED_DIR }}/*arm64-v8a*.apk
          if-no-files-found: warn
          retention-days: 7

      - name: Upload armeabi-v7a APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}_armeabi-v7a
          path: ${{ env.SIGNED_DIR }}/*armeabi-v7a*.apk
          if-no-files-found: warn
          retention-days: 7
